<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chingadita | Tienda de Chiles Habaneros</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fdf2e9; /* Tono crema suave */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #d32f2f; /* Rojo picante */
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
        }

        h2 { color: #e65100; text-align: center; }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas */
            gap: 10px;
        }

        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #d32f2f; }

        /* Los campos de correo y contraseña ocupan las dos columnas */
        .full-width { grid-column: span 2; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #2e7d32; /* Verde chile */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover { background-color: #1b5e20; }
    </style>
</head>
<body>

    <header>
        <h1>🌶️ La Chingadita</h1>
        <p>Auténtico Chile Habanero</p>
    </header>

    <div class="container">
        <h2>Registro de Cliente</h2>
        <form id="tiendaForm">
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="apellidos" placeholder="Apellidos" required>
                <input type="tel" id="telefono" placeholder="Teléfono" required>
                <input type="number" id="cp" placeholder="C.P." required>
                <input type="text" id="estado" placeholder="Estado" required>
                <input type="text" id="ciudad" placeholder="Ciudad" required>
                <input type="email" id="correo" class="full-width" placeholder="Correo Electrónico" required>
                <input type="password" id="password" class="full-width" placeholder="Crea tu contraseña" required>
            </div>
            <button type="submit">Registrarme en la tienda</button>
        </form>
    </div>

    <script>
        // Escuchamos cuando el usuario hace clic en el botón de enviar
        document.getElementById('tiendaForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se refresque

            // Creamos las variables capturando los valores de los inputs
            const nombre = document.getElementById('nombre').value;
            const apellidos = document.getElementById('apellidos').value;
            const telefono = document.getElementById('telefono').value;
            const correo = document.getElementById('correo').value;
            const estado = document.getElementById('estado').value;
            const ciudad = document.getElementById('ciudad').value;
            const cp = document.getElementById('cp').value;
            const password = document.getElementById('password').value;

            // Mostramos los datos en la consola (F12 en tu navegador)
            console.log("--- Nuevo Registro en La Chingadita ---");
            console.log("Cliente:", nombre, apellidos);
            console.log("Contacto:", telefono, "|", correo);
            console.log("Ubicación:", ciudad, estado, "CP:", cp);
            console.log("Password:", password);

            alert("¡Gracias " + nombre + "! Tus datos han sido recibidos para las pruebas.");
        });
    </script>

</body>
</html>
